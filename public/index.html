<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        h1 { color: #38bdf8; }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .run { background: #22c55e; }
        .view { background: #3b82f6; }
        .clear { background: #ef4444; }

        pre {
            text-align: left;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            max-width: 90%;
            margin: auto;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h1>🚀 Log Dashboard V2 </h1>

<button class="run" onclick="runLog()">Run Log</button>
<button class="view" onclick="getLogs()">View Logs</button>
<button class="clear" onclick="clearLogs()">Clear Logs</button>

<h3>📄 Output:</h3>
<pre id="output">No logs yet...</pre>

<script>
async function runLog() {
    const res = await fetch("/api/run-log");
    const data = await res.json();
    alert(data.status);
}

async function getLogs() {
    const res = await fetch("/api/logs");
    const data = await res.json();
    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

async function clearLogs() {
    const res = await fetch("/api/logs", { method: "DELETE" });
    const data = await res.json();
    alert(data.status);
    document.getElementById("output").textContent = "Logs cleared";
}
</script>

</body>
</html>
